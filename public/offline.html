<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · Riad Dar D'Art</title>
    <meta name="theme-color" content="#1E4D45" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; margin: 0; }
      html, body { height: 100%; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem 1.5rem;
        background: #f4efe7;
        color: #2b2b2b;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .mark {
        width: 88px; height: 88px; border-radius: 22px;
        background: #1e4d45; color: #f4efe7;
        display: flex; align-items: center; justify-content: center;
        font-family: Georgia, "Times New Roman", serif; font-size: 52px;
        box-shadow: 0 8px 28px rgba(30,77,69,0.28);
        margin-bottom: 1.75rem;
      }
      .label {
        font-size: 11px; letter-spacing: 0.34em; text-transform: uppercase;
        color: #1e4d45; margin-bottom: 0.6rem;
      }
      h1 {
        font-family: Georgia, "Times New Roman", serif; font-weight: 500;
        font-size: 1.9rem; line-height: 1.2; margin-bottom: 0.9rem;
      }
      p { color: #6e655a; max-width: 30rem; line-height: 1.6; font-size: 0.98rem; }
      button {
        margin-top: 2rem; border: 0; cursor: pointer;
        background: #1e4d45; color: #fff;
        padding: 0.85rem 2rem; border-radius: 4px;
        font-size: 0.85rem; letter-spacing: 0.06em;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #12212f; color: #e8dfc8; }
        .label { color: #5aa697; }
        p { color: #b7ab93; }
        .mark { background: #17293b; color: #e8dfc8; box-shadow: 0 8px 28px rgba(0,0,0,0.4); }
        button { background: #5aa697; color: #12212f; }
      }
    </style>
  </head>
  <body>
    <div class="mark">D</div>
    <div class="label">Riad Dar D'Art</div>
    <h1>You're offline</h1>
    <p>
      It looks like you've lost your connection. Reconnect to the internet to
      view rooms, excursions, and reach the concierge.
    </p>
    <button onclick="location.reload()">Try again</button>
  </body>
</html>
